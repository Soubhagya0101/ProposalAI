services:
  scheduler:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PROPOSALAI_REVENUE_DATA_DIR: /app/revenue_ops_data
      PROPOSALAI_WEBHOOK_HOST: 0.0.0.0
    volumes:
      - ./revenue_ops_data:/app/revenue_ops_data
    command: ["python", "-m", "revenue_ops", "cloud-scheduler"]

  dashboard:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PROPOSALAI_REVENUE_DATA_DIR: /app/revenue_ops_data
    volumes:
      - ./revenue_ops_data:/app/revenue_ops_data:ro
    ports:
      - "127.0.0.1:8765:8765"
    command: ["python", "-m", "revenue_ops", "dashboard", "--host", "0.0.0.0", "--port", "8765"]

  webhook:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PROPOSALAI_REVENUE_DATA_DIR: /app/revenue_ops_data
      PROPOSALAI_WEBHOOK_HOST: 0.0.0.0
      PROPOSALAI_WEBHOOK_PORT: 8770
    volumes:
      - ./revenue_ops_data:/app/revenue_ops_data
    ports:
      - "8770:8770"
    command: ["python", "-m", "revenue_ops", "brevo-webhook-server", "--host", "0.0.0.0", "--port", "8770"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8770/health', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
