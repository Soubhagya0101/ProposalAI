services:
  - type: web
    name: proposalai
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python server.py
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GENERATION_MODEL_ID
        value: llama-3.3-70b-versatile
      - key: GITHUB_MODELS_TOKEN
        sync: false
      - key: PROPOSALAI_FEEDBACK_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
