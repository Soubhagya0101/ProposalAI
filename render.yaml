services:
  - type: web
    name: proposalai
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python server.py
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: GITHUB_MODELS_TOKEN
        sync: false
      - key: PROPOSALAI_FEEDBACK_SHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FEEDBACK_SUMMARY_SECRET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: BREVO_REPLY_TO_EMAIL
        sync: false
      - key: PROPOSALAI_REPORT_EMAIL
        sync: false
