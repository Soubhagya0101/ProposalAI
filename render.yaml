services:
  - type: web
    name: proposalai
    runtime: python
    plan: free
    region: singapore
    buildCommand: ""
    startCommand: python server.py
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: GITHUB_MODELS_TOKEN
        sync: false
      - key: GITHUB_MODELS_MODEL
        value: openai/gpt-4o-mini
